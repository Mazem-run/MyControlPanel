server {
    listen 80;
    server_name test.local www.test.local;

    root A:/Games/websites/test/MyControlPanel/test_env/var/www/test.local/public_html;
    index index.html index.htm index.php;

    # In production, make sure the log directory exists
    # access_log /var/log/nginx/test.local.access.log;
    # error_log /var/log/nginx/test.local.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
